name: Docker Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Prepare SSH key
        id: prep_ssh
        shell: bash
        run: |
          set -e
          SSH_KEY_CONTENT=""
          if [ -n "${{ secrets.SERVER_SSH_KEY_B64 }}" ]; then
            SSH_KEY_CONTENT="$(printf '%s' '${{ secrets.SERVER_SSH_KEY_B64 }}' | base64 -d | sed 's/\r$//')"
          else
            SSH_KEY_CONTENT="$(printf '%b' '${{ secrets.SERVER_SSH_KEY }}' | sed 's/\r$//')"
          fi
          if [ -z "$SSH_KEY_CONTENT" ]; then
            echo "SERVER_SSH_KEY_B64 / SERVER_SSH_KEY is empty" >&2
            exit 1
          fi
          echo "ssh_key<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SSH_KEY_CONTENT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ steps.prep_ssh.outputs.ssh_key }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: ${{ secrets.SERVER_PORT != '' && secrets.SERVER_PORT || '22' }}
          script: |
            set -euo pipefail

            DOCKER_USER_RAW="${{ secrets.DOCKER_USERNAME }}"
            DOCKER_IMAGE_RAW="${{ secrets.DOCKER_IMAGE_NAME }}"
            DOCKER_USER="$(printf '%s' "$DOCKER_USER_RAW" | tr -d '\r\n' | xargs)"
            DOCKER_IMAGE="$(printf '%s' "$DOCKER_IMAGE_RAW" | tr -d '\r\n' | xargs)"

            if [ -z "$DOCKER_IMAGE" ]; then
              echo "DOCKER_IMAGE_NAME is empty" >&2
              exit 1
            fi

            if printf '%s' "$DOCKER_IMAGE" | grep -q '/'; then
              IMAGE_REPO_RAW="$DOCKER_IMAGE"
            else
              IMAGE_REPO_RAW="$DOCKER_USER/$DOCKER_IMAGE"
            fi

            IMAGE_REPO="$(printf '%s' "$IMAGE_REPO_RAW" | tr '[:upper:]' '[:lower:]' | xargs)"
            IMAGE="$IMAGE_REPO:latest"
            CONTAINER="$(printf '%s' '${{ vars.DEPLOY_CONTAINER_NAME }}' | tr -d '\r\n' | xargs)"
            ENV_FILE="$(printf '%s' '${{ vars.DEPLOY_ENV_FILE }}' | tr -d '\r\n' | xargs)"
            DATA_DIR="$(printf '%s' '${{ vars.DEPLOY_DATA_DIR }}' | tr -d '\r\n' | xargs)"
            LOG_DIR="$(printf '%s' '${{ vars.DEPLOY_LOG_DIR }}' | tr -d '\r\n' | xargs)"
            PORT_MAP="$(printf '%s' '${{ vars.DEPLOY_PORT_MAP }}' | tr -d '\r\n' | xargs)"

            if [ -z "$CONTAINER" ]; then
              CONTAINER="custom-server"
            fi
            if [ -z "$PORT_MAP" ]; then
              PORT_MAP="8000:8000"
            fi

            docker pull "$IMAGE"
            docker stop "$CONTAINER" || true
            docker rm "$CONTAINER" || true

            if [ -n "$ENV_FILE" ] && [ -n "$DATA_DIR" ] && [ -n "$LOG_DIR" ]; then
              docker run -d --name "$CONTAINER" -p "$PORT_MAP" --env-file "$ENV_FILE" -v "$DATA_DIR:/app/app/data" -v "$LOG_DIR:/app/logs" "$IMAGE"
            elif [ -n "$ENV_FILE" ] && [ -n "$DATA_DIR" ]; then
              docker run -d --name "$CONTAINER" -p "$PORT_MAP" --env-file "$ENV_FILE" -v "$DATA_DIR:/app/app/data" "$IMAGE"
            elif [ -n "$ENV_FILE" ] && [ -n "$LOG_DIR" ]; then
              docker run -d --name "$CONTAINER" -p "$PORT_MAP" --env-file "$ENV_FILE" -v "$LOG_DIR:/app/logs" "$IMAGE"
            elif [ -n "$DATA_DIR" ] && [ -n "$LOG_DIR" ]; then
              docker run -d --name "$CONTAINER" -p "$PORT_MAP" -v "$DATA_DIR:/app/app/data" -v "$LOG_DIR:/app/logs" "$IMAGE"
            elif [ -n "$ENV_FILE" ]; then
              docker run -d --name "$CONTAINER" -p "$PORT_MAP" --env-file "$ENV_FILE" "$IMAGE"
            elif [ -n "$DATA_DIR" ]; then
              docker run -d --name "$CONTAINER" -p "$PORT_MAP" -v "$DATA_DIR:/app/app/data" "$IMAGE"
            elif [ -n "$LOG_DIR" ]; then
              docker run -d --name "$CONTAINER" -p "$PORT_MAP" -v "$LOG_DIR:/app/logs" "$IMAGE"
            else
              docker run -d --name "$CONTAINER" -p "$PORT_MAP" "$IMAGE"
            fi
            docker image prune -f