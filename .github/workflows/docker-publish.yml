name: Docker Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Prepare SSH key
        id: prep_ssh
        shell: bash
        run: |
          set -e
          # Support secrets pasted either as real multiline PEM or single-line with \n escapes.
          SSH_KEY_CONTENT="$(printf '%b' '${{ secrets.SERVER_SSH_KEY }}' | sed 's/\r$//')"
          if [ -z "$SSH_KEY_CONTENT" ]; then
            echo "SERVER_SSH_KEY is empty" >&2
            exit 1
          fi
          echo "ssh_key<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SSH_KEY_CONTENT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ steps.prep_ssh.outputs.ssh_key }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script_stop: true
          script: |
            set -e

            IMAGE="${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest"
            CONTAINER="${{ vars.DEPLOY_CONTAINER_NAME }}"
            ENV_FILE="${{ vars.DEPLOY_ENV_FILE }}"
            DATA_DIR="${{ vars.DEPLOY_DATA_DIR }}"
            LOG_DIR="${{ vars.DEPLOY_LOG_DIR }}"
            PORT_MAP="${{ vars.DEPLOY_PORT_MAP }}"

            if [ -z "$CONTAINER" ]; then
              CONTAINER="custom-server"
            fi
            if [ -z "$PORT_MAP" ]; then
              PORT_MAP="8000:8000"
            fi

            docker pull "$IMAGE"
            docker stop "$CONTAINER" || true
            docker rm "$CONTAINER" || true

            RUN_CMD="docker run -d --name $CONTAINER -p $PORT_MAP"
            if [ -n "$ENV_FILE" ]; then
              RUN_CMD="$RUN_CMD --env-file $ENV_FILE"
            fi
            if [ -n "$DATA_DIR" ]; then
              RUN_CMD="$RUN_CMD -v $DATA_DIR:/app/app/data"
            fi
            if [ -n "$LOG_DIR" ]; then
              RUN_CMD="$RUN_CMD -v $LOG_DIR:/app/logs"
            fi

            eval "$RUN_CMD $IMAGE"
            docker image prune -f
