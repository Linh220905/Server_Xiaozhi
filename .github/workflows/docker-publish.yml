name: Docker Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Prepare SSH key
        id: prep_ssh
        shell: bash
        run: |
          set -e
          SSH_KEY_CONTENT=""
          if [ -n "${{ secrets.SERVER_SSH_KEY_B64 }}" ]; then
            SSH_KEY_CONTENT="$(printf '%s' '${{ secrets.SERVER_SSH_KEY_B64 }}' | base64 -d | sed 's/\r$//')"
          else
            SSH_KEY_CONTENT="$(printf '%b' '${{ secrets.SERVER_SSH_KEY }}' | sed 's/\r$//')"
          fi
          if [ -z "$SSH_KEY_CONTENT" ]; then
            echo "SERVER_SSH_KEY_B64 / SERVER_SSH_KEY is empty" >&2
            exit 1
          fi
          echo "ssh_key<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SSH_KEY_CONTENT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ steps.prep_ssh.outputs.ssh_key }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: ${{ secrets.SERVER_PORT != '' && secrets.SERVER_PORT || '22' }}
          script: |
            set -euo pipefail

            docker pull dtl2309/nexus-server:latest
            docker stop custom-server || true
            docker rm custom-server || true
            docker run -d \
              --name custom-server \
              --restart unless-stopped \
              -p 127.0.0.1:8000:8000 \
              --env-file /root/Nexus-server-docker/.env \
              -v /root/Nexus-server-docker/app/data:/app/app/data \
              -v /root/Nexus-server-docker/logs:/app/logs \
              dtl2309/nexus-server:latest
            docker image prune -f